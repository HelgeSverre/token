[package]
name = "tree-sitter-sema"
description = "Sema grammar for the tree-sitter parsing library"
version = "0.1.0"
authors = ["Helge Sverre <helge.sverre@gmail.com>"]
keywords = ["incremental", "parsing", "tree-sitter", "sema"]
categories = ["parsing", "text-editors"]
repository = "https://github.com/sema-lisp/tree-sitter-sema"
edition = "2021"
license = "MIT"
autoexamples = false

build = "bindings/rust/build.rs"
include = [
  "LICENSE",
  "bindings/rust",
  "grammar.js",
  "queries",
  "src",
  "tree-sitter.json",
]

[lib]
path = "bindings/rust/lib.rs"

[dependencies]
tree-sitter-language = "0.1"

[build-dependencies]
cc = "1.1"

[dev-dependencies]
tree-sitter = "0.25"
